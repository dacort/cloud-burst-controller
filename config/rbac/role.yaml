---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools/finalizers
  verbs:
  - update
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools/status
  verbs:
  - get
  - patch
  - update
