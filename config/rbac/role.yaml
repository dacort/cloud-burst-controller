---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools/status
  verbs:
  - get
  - patch
  - update
