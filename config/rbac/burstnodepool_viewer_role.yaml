# This rule is not used by the project cloud-burst-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to burst.homelab.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cloud-burst-controller
    app.kubernetes.io/managed-by: kustomize
  name: burstnodepool-viewer-role
rules:
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - burst.homelab.dev
  resources:
  - burstnodepools/status
  verbs:
  - get
